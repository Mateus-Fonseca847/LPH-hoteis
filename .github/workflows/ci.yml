name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/lph_ci?schema=public
      AUTH_SECRET: ci-auth-secret-not-real-change-in-real-env
      TWO_FACTOR_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      PAYMENT_SECRETS_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test
      ALLOW_LOCAL_HOTEL_DATA_FALLBACK: "false"
      PAYMENT_PROVIDER: mercado_pago
      MERCADO_PAGO_SANDBOX: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run quality gate
        run: npm run quality

      - name: Run tests
        run: npm run test
