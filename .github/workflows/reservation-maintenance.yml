name: Reservation maintenance

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expire-and-reconcile:
    name: Expire and reconcile reservations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call internal reservation maintenance
        env:
          APP_INTERNAL_BASE_URL: ${{ secrets.APP_INTERNAL_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          test -n "$APP_INTERNAL_BASE_URL"
          test -n "$INTERNAL_API_TOKEN"

          for attempt in 1 2 3; do
            if curl --fail --show-error --silent \
              --request POST \
              --header "Authorization: Bearer $INTERNAL_API_TOKEN" \
              "$APP_INTERNAL_BASE_URL/api/internal/reservas/expirar"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Tentativa $attempt falhou; repetindo em 20s."
              sleep 20
            fi
          done

          echo "Rotina de manutencao falhou apos 3 tentativas."
          exit 1
